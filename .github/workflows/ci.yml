name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    name: Lint · Typecheck · Unit tests · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          JWT_SECRET: ci-build-secret
          MONGODB_URI: mongodb://localhost:27017/food-ordering-db

  e2e:
    name: API integration tests
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Seed database
        run: npm run seed
        env:
          MONGODB_URI: mongodb://localhost:27017/food-ordering-db

      - name: Build
        run: npm run build
        env:
          JWT_SECRET: ci-e2e-secret
          MONGODB_URI: mongodb://localhost:27017/food-ordering-db

      - name: Start app & run E2E
        env:
          JWT_SECRET: ci-e2e-secret
          MONGODB_URI: mongodb://localhost:27017/food-ordering-db
        run: |
          npm run start &
          npx --yes wait-on http://localhost:3000/api/health --timeout 60000
          npm run test:e2e
